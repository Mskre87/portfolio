<div class="section-header">

    {% if label %}

        <span class="section-label">
            
            {{ label }}

        </span>

    {% endif %}

    {% if title %}

    <h2 class="section-title">

        {{ title }}

    </h2>

    {% endif %}

    {% if description %}

        <p class="section-description">

            {{ description }}

        </p>

    {% endif %}

</div>
