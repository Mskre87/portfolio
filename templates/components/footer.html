<footer class="footer">

    <div class="container">

        <div class="footer__content">

            <div class="footer__brand">

                <h2 class="footer__logo">
                    {{ site.name }}<span>.</span>
                </h2>

                <p class="footer__tagline">
                    {{ site.tagline }}
                </p>

            </div>

            <nav class="footer__links">

                {% if site.github %}
                <a href="{{ site.github }}" target="_blank" rel="noopener noreferrer">
                    GitHub
                </a>
                {% endif %}

                {% if site.linkedin %}
                <a href="{{ site.linkedin }}" target="_blank" rel="noopener noreferrer">
                    LinkedIn
                </a>
                {% endif %}

                {% if site.credly %}
                <a href="{{ site.credly }}" target="_blank" rel="noopener noreferrer">
                    Credly
                </a>
                {% endif %}

                {% if site.hackerone %}
                <a href="{{ site.hackerone }}" target="_blank" rel="noopener noreferrer">
                    HackerOne
                </a>
                {% endif %}

            </nav>

        </div>

        <div class="footer__bottom">

            <p>{{ site.copyright }}</p>

        </div>

    </div>

</footer>
